name: Compile SQLite3 for Android

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab

jobs:
  fetch-sqlite:
    runs-on: ubuntu-latest
    steps:
      - name: scrape and fetch latest sqlite amalgamation link
        id: sqliteUrl
        run: |
          content=$(curl -sSL 'https://www.sqlite.org')
          regex='PRODUCT,([^,]+),([0-9]{4})\/([^,]+amalgamation[^,]+)'
          
          if [[ $content =~ $regex ]]; then
              version="${BASH_REMATCH[1]}"
              year="${BASH_REMATCH[2]}"
              path="${BASH_REMATCH[3]}"
              [[ "$path" != *.zip ]] && path="${path}.zip"
              sqliteUrl="https://www.sqlite.org/${year}/${path}"
          else
              sqliteUrl="https://www.sqlite.org/2026/sqlite-amalgamation-3520000.zip"
          fi
          
          echo "sqliteUrl=$sqliteUrl" >> $GITHUB_OUTPUT

      - name: download sqlite3 amalgamation
        run: |
          echo "sqliteUrl: ${{ steps.sqliteUrl.outputs.sqliteUrl }}"
          # curl -O "${{ steps.sqliteUrl.outputs.sqliteUrl }}"

